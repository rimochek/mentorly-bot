services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mentorly
      POSTGRES_USER: mentorly
      POSTGRES_PASSWORD: mentorly
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mentorly -d mentorly"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    env_file:
      - .env
    command: sh -c "alembic upgrade head && python -m app.main"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
